name: Canonical Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  torch-free:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: applications/frontend/package-lock.json

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-build-isolation
        shell: bash

      - name: Install frontend dependencies
        run: npm ci
        working-directory: applications/frontend

      - name: Run canonical torch-free tests
        run: bash ops/scripts/run_canonical_tests.sh torch-free

      - name: Run canonical frontend tests
        run: bash ops/scripts/run_canonical_tests.sh frontend
