<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="750" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Figure 2. Alert Policy Decision Flow</text>
<rect x="90" y="180" rx="18" ry="18" width="220" height="100" fill="#e0f2fe" stroke="#334155" stroke-width="2"/>
<text x="200" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Window-level model score</text>
<rect x="360" y="180" rx="18" ry="18" width="220" height="100" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
<text x="470" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Validation-fitted operating point</text>
<rect x="660" y="180" rx="18" ry="18" width="220" height="100" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
<text x="770" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Temporal smoothing / EMA</text>
<rect x="950" y="180" rx="18" ry="18" width="220" height="100" fill="#fde68a" stroke="#334155" stroke-width="2"/>
<text x="1060" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">k-of-n alert logic</text>
<rect x="1180" y="180" rx="18" ry="18" width="220" height="100" fill="#fecaca" stroke="#334155" stroke-width="2"/>
<text x="1290" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Cooldown / confirmation</text>
<rect x="1280" y="360" rx="18" ry="18" width="160" height="90" fill="#ddd6fe" stroke="#334155" stroke-width="2"/>
<text x="1360" y="411" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Final alert state</text>
<line x1="310" y1="230" x2="360" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="580" y1="230" x2="660" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="880" y1="230" x2="950" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1170" y1="230" x2="1180" y2="230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1290" y1="280" x2="1360" y2="350" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<text x="200" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#0f172a">Raw probability is not yet an operational decision.</text>
<text x="785" y="330" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#0f172a">The deployed monitor consumes a fitted policy profile, not a single ad hoc threshold.</text>
</svg>
