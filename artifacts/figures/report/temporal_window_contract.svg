<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8f7f3"/>
  <text x="600" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#1f2a36">Temporal Window Contract and Span Overlap Semantics</text>
  <text x="600" y="74" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#56616b">Window labels come from span overlap, while later event grouping is a separate runtime interpretation stage.</text>

  <line x1="90" y1="170" x2="1110" y2="170" stroke="#24313b" stroke-width="4"/>
  <text x="90" y="145" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#24313b">Raw sequence timeline</text>

  <rect x="420" y="145" width="180" height="50" rx="12" fill="#f6c56a" stroke="#b27d21" stroke-width="2"/>
  <text x="510" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#5e4212">Annotated fall span</text>

  <text x="90" y="242" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#24313b">Sliding windows (`W=48`, `S=12`)</text>

  <rect x="120" y="275" width="180" height="52" rx="10" fill="#dde8f4" stroke="#5f84aa" stroke-width="2"/>
  <text x="210" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#2b4360">Window 1</text>

  <rect x="220" y="275" width="180" height="52" rx="10" fill="#dde8f4" stroke="#5f84aa" stroke-width="2"/>
  <text x="310" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#2b4360">Window 2</text>

  <rect x="320" y="275" width="180" height="52" rx="10" fill="#fde3a7" stroke="#b27d21" stroke-width="2"/>
  <text x="410" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#5e4212">Window 3</text>

  <rect x="420" y="275" width="180" height="52" rx="10" fill="#fde3a7" stroke="#b27d21" stroke-width="2"/>
  <text x="510" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#5e4212">Window 4</text>

  <rect x="520" y="275" width="180" height="52" rx="10" fill="#fde3a7" stroke="#b27d21" stroke-width="2"/>
  <text x="610" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#5e4212">Window 5</text>

  <rect x="620" y="275" width="180" height="52" rx="10" fill="#dde8f4" stroke="#5f84aa" stroke-width="2"/>
  <text x="710" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#2b4360">Window 6</text>

  <rect x="720" y="275" width="180" height="52" rx="10" fill="#dde8f4" stroke="#5f84aa" stroke-width="2"/>
  <text x="810" y="307" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#2b4360">Window 7</text>

  <text x="930" y="308" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#465563">yellow = positive by span overlap</text>

  <line x1="510" y1="195" x2="510" y2="260" stroke="#b27d21" stroke-width="2" stroke-dasharray="6 5"/>

  <text x="90" y="390" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#24313b">Window-level label assignment</text>
  <rect x="120" y="415" width="420" height="100" rx="16" fill="#ffffff" stroke="#8c9aa5" stroke-width="2"/>
  <text x="330" y="450" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#24313b">Offline labeling rule</text>
  <text x="330" y="480" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#495864">A window is positive when it overlaps an annotated fall span</text>
  <text x="330" y="505" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#495864">using the locked FPS and window metadata contract.</text>

  <text x="660" y="390" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#24313b">Later runtime event grouping</text>
  <rect x="660" y="415" width="420" height="100" rx="16" fill="#ffffff" stroke="#8c9aa5" stroke-width="2"/>
  <text x="870" y="450" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#24313b">Runtime interpretation rule</text>
  <text x="870" y="480" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#495864">Persisted events are formed later through policy, smoothing,</text>
  <text x="870" y="505" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#495864">cooldown, and grouping semantics, not by one window alone.</text>

  <path d="M550 465 C590 465, 610 465, 645 465" fill="none" stroke="#6b7781" stroke-width="3"/>
  <polygon points="638,459 654,465 638,471" fill="#6b7781"/>

  <text x="600" y="615" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#495864">The contract keeps offline labeling and runtime persistence related but distinct.</text>
</svg>
