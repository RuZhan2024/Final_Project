stage_output_schema:
  required_fields:
    - stage_id
    - stage_name
    - version
    - goal
    - inputs
    - actions
    - deliverables
    - evidence_used
    - risks
    - decision
    - loop_trigger
    - updated_files
    - progress_summary
    - status

stage_groups:
  A:
    name: "Research Definition"
    stages:
      - id: 1
        name: "TOPIC_INIT"
        purpose: "Define research goals, scope, success criteria, and boundaries"
      - id: 2
        name: "PROBLEM_DECOMPOSE"
        purpose: "Break down the research problem into prioritized sub-questions"

  B:
    name: "Literature Discovery"
    stages:
      - id: 3
        name: "SEARCH_STRATEGY"
        purpose: "Design search strategy, keywords, sources, and screening principles"
      - id: 4
        name: "LITERATURE_COLLECT"
        purpose: "Collect real candidate papers"
      - id: 5
        name: "LITERATURE_SCREEN"
        purpose: "Gate relevance and quality"
      - id: 6
        name: "KNOWLEDGE_EXTRACT"
        purpose: "Extract knowledge cards and evidence summaries"

  C:
    name: "Knowledge Synthesis"
    stages:
      - id: 7
        name: "SYNTHESIS"
        purpose: "Cluster literature, identify gaps, and surface opportunities"
      - id: 8
        name: "HYPOTHESIS_GEN"
        purpose: "Form falsifiable hypotheses"
      - id: "8.5"
        name: "THEORETICAL_BOUNDS"
        purpose: "Capture preliminary theory, complexity, and boundary conditions"

  D:
    name: "Experiment Design"
    stages:
      - id: 9
        name: "EXPERIMENT_DESIGN"
        purpose: "Define experiment matrix, metrics, data, baselines, ablations, and budget"
      - id: 10
        name: "CODE_GENERATION"
        purpose: "Generate or organize runnable code"
      - id: 11
        name: "RESOURCE_PLANNING"
        purpose: "Plan time and compute resources"

  E:
    name: "Experiment Execution"
    stages:
      - id: 12
        name: "EXPERIMENT_RUN"
        purpose: "Run pilot and full experiments"
      - id: 13
        name: "ITERATIVE_REFINE"
        purpose: "Fix or optimize based on metrics, errors, and logs"

  F:
    name: "Analysis and Decisions"
    stages:
      - id: 14
        name: "RESULT_ANALYSIS"
        purpose: "Analyze results objectively and assess support for claims"
      - id: 15
        name: "RESEARCH_DECISION"
        purpose: "Decide PROCEED / REFINE / PIVOT"

  G:
    name: "Paper Writing"
    stages:
      - id: 16
        name: "PAPER_OUTLINE"
        purpose: "Build the paper skeleton, Figure 1, and evidence map"
      - id: 17
        name: "PAPER_DRAFT"
        purpose: "Produce a full draft"
      - id: 18
        name: "PEER_REVIEW"
        purpose: "Run method-evidence consistency and reviewer-style critique"
      - id: 19
        name: "PAPER_REVISION"
        purpose: "Revise against reviews and page constraints"

  H:
    name: "Finalization and Archive"
    stages:
      - id: 20
        name: "QUALITY_GATE"
        purpose: "Run final gating checks"
      - id: 21
        name: "KNOWLEDGE_ARCHIVE"
        purpose: "Archive reproducibility notes and future work"
      - id: 22
        name: "EXPORT_PUBLISH"
        purpose: "Export a venue-compliant paper package"
      - id: 23
        name: "CITATION_VERIFY"
        purpose: "Verify citation authenticity and relevance"

  I:
    name: "Review Iteration"
    stages:
      - id: 24
        name: "3RD_PARTY_REVIEW"
        purpose: "Run the harshest external review pass"
      - id: 25
        name: "REBUTTAL"
        purpose: "Run targeted experiments or writing fixes after critique"

loop_rules:
  refine_trigger:
    - "code runs but primary metrics are below target"
    - "a key claim lacks supporting evidence"
    - "baseline tuning is obviously weaker than the proposed method"
    - "a critical ablation is missing"
    - "results and paper wording do not match"
    - "NaN or Inf appears and the root cause is fixable"
  pivot_trigger:
    - "the core hypothesis is repeatedly contradicted by evidence"
    - "data quality is insufficient to answer the main question"
    - "the proposed method cannot be implemented faithfully"
    - "the framing is clearly misaligned with the target venue"
    - "the contribution cannot be reduced to 1-2 coherent technical ideas"
  rebuttal_trigger:
    - "external review identifies a major evidence gap"
    - "a key baseline is unfair"
    - "a claim is too strong"
    - "paper structure does not support the contributions"

per_stage_rules:
  before_each_stage:
    - "create a plan file in plans/"
    - "write goal, deliverables, risks, and exit criteria"
  after_each_stage:
    - "update PROGRESS.md"
    - "record artifact paths"
    - "record version"
    - "record whether loop-back was triggered"
    - "sync CLAIMS.yaml when applicable"
