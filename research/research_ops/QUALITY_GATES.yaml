gates:
  literature_gate:
    applies_to_stage: 5
    must_pass:
      - "candidate papers come from real traceable sources"
      - "the shortlist is highly relevant to the topic"
      - "DOI or arXiv ID or cite_key is preserved when available"
      - "the reference target remains achievable"
      - "knowledge cards are sufficient to support related work and positioning"
    fail_if:
      - "off-topic papers remain in the shortlist"
      - "reference volume is too low without a recovery plan"
      - "identifier coverage is badly missing"
    on_fail:
      - "return to SEARCH_STRATEGY or LITERATURE_COLLECT"

  experiment_design_gate:
    applies_to_stage: 9
    must_pass:
      - "every core claim maps to at least one experiment or analysis"
      - "strong fair baselines exist"
      - "key ablations exist"
      - "metrics match the research question"
      - "data splits, seeds, and budget are clear"
      - "the pilot plan is defined"
    fail_if:
      - "experiments cannot support the main conclusions"
      - "the proposed method has no fair baseline"
      - "only main results exist without ablations"
      - "budget and design are seriously mismatched"
    on_fail:
      - "return to HYPOTHESIS_GEN or EXPERIMENT_DESIGN"

  final_quality_gate:
    applies_to_stage: 20
    must_pass:
      - "all major paper claims are registered in CLAIMS.yaml"
      - "all evidence IDs referenced by CLAIMS.yaml exist in EVIDENCE_INDEX.yaml"
      - "no critical fabrication exists"
      - "paper, results, logs, and tables are consistent"
      - "baselines and ablations are complete"
      - "citations are real and relevant"
      - "main body page count is compliant"
      - "Figure 1 is defined and supports a core contribution"
      - "limitations are honest"
      - "project paths referenced by PROJECT_CONFIG.yaml are still valid or explicitly marked empty"
    fail_if:
      - "the paper reports experiments that were not run"
      - "the paper reports statistical tests not present in code or logs"
      - "the paper reports metrics that do not exist"
      - "unsupported major claims remain in the paper"
      - "the control layer contains stale audit instructions that contradict the current draft state"
    on_fail:
      - "return to PAPER_REVISION, RESULT_ANALYSIS, or ITERATIVE_REFINE"

critical_fabrication_definition:
  - "claiming experiments that were not run"
  - "claiming methods that were not implemented"
  - "claiming statistical testing that does not exist"
  - "fabricating tables, figures, trends, or numbers"
  - "citing non-existent or clearly irrelevant papers"

review_checklist:
  - "Does this section directly serve the topic?"
  - "Does this claim point to a concrete evidence ID?"
  - "Was the baseline tuned fairly?"
  - "If a component is claimed effective, is there a removal ablation?"
  - "Can the result be traced through code, logs, and tables?"
