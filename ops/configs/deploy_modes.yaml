# Deployment triage config (defaults)
# This file controls:
# - per-arch triage thresholds (tau_low / tau_high) + EMA smoothing
# - timing / persistence for "possible" vs "confirmed" alerts
# - MC-dropout sampling counts

tcn:
  tau_low: 0.05
  tau_high: 0.90
  ema_alpha: 0.20
  # sigma_max: 0.08  # optional: if set, triage becomes "uncertain" when sigma > sigma_max

gcn:
  tau_low: 0.05
  tau_high: 0.90
  ema_alpha: 0.20
  # sigma_max: 0.10

single:
  possible_k: 3
  possible_T_s: 2.0
  confirm_T_s: 3.6
  confirm_k_fall: 2
  cooldown_possible_s: 15.0
  cooldown_confirmed_s: 60.0

dual:
  possible_k: 3
  possible_T_s: 2.0
  confirm_T_s: 3.6
  confirm_k_tcn: 1
  confirm_k_gcn: 1
  require_both: true
  cooldown_possible_s: 15.0
  cooldown_confirmed_s: 60.0

mc:
  M: 1
  M_confirm: 8
