services:
  mysql:
    image: mysql:8.0
    container_name: fall_detection_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_here}
      MYSQL_DATABASE: ${DB_NAME:-elder_fall_monitor}
      MYSQL_USER: ${DB_USER:-fall_app}
      MYSQL_PASSWORD: ${DB_PASS:-strong_password_here}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./applications/backend/create_db.sql:/docker-entrypoint-initdb.d/01_create_db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root_password_here}"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fall_detection_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.local.private
    environment:
      DB_BACKEND: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-fall_app}
      DB_PASS: ${DB_PASS:-strong_password_here}
      DB_NAME: ${DB_NAME:-elder_fall_monitor}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
      PYTHONPATH: /app/ml/src:/app
      MEDIAPIPE_DISABLE_GPU: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app
      - backend_event_clips:/app/applications/backend/event_clips
    command: >
      uvicorn applications.backend.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./applications/frontend
      dockerfile: Dockerfile.dev
    container_name: fall_detection_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      BROWSER: none
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_BASE: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./applications/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && npm start"

volumes:
  mysql_data:
  backend_event_clips:
  frontend_node_modules:
