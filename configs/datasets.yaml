root: "./data/raw"

datasets:
  le2i:
    type: video
    videos_glob: "LE2i/**/videos/*.mp4"   # handles spaces like "Lecture room"
    fps: 25
    labels_json: "configs/labels/le2i.json"
    out_dir: "data/interim/le2i/pose_npz"

  urfd:
    type: image_seq
    images_glob:
      - "UR_Fall/adl/*/*.png"
      - "UR_Fall/fall/*/*.png"
    sequence_id_depth: 1
    label_from_path:
      which_component_from_root: 1  # 0=UR_Fall, 1=adl|fall
      mapping: {adl: "adl", fall: "fall"}
    fps: 30
    out_dir: "data/interim/urfd/pose_npz"

  caucafall:
    type: image_seq
    images_glob:
      - "CAUCAFall/CAUCAFall/*/*/*.png"
    sequence_id_depth: 2  # <subject>/<scenario>
    label_rule: "if 'fall' in lower(scenario) then 'fall' else 'adl'"
    fps: 30
    out_dir: "data/interim/caucafall/pose_npz"

  ntu60:
    type: skeleton3d
    skeletons_glob: "NTU/nturgb+d_skeletons/*.skeleton"
    out_dir: "data/interim/ntu60/skel_npz"
    drop_z: true
    normalise_per_person: true
    fps: 30

pose_model:
  name: "BlazePose-FullBody-33"
  out_joints: 33
  format: "xyc"   # [x,y,confidence]

standard_schema:
  frame: {J: 33, order: "mediapipe_blazepose_33"}
  window: {W: 48, stride: 12}

missing:
  - muvim
