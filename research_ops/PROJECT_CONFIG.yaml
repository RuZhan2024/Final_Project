core_contributions:
  - name: "End-to-end deployment-oriented fall-detection system"
    description: "A pose-based system spanning preprocessing, temporal window generation, training, operating-point fitting, backend inference, and replay-oriented runtime validation."
  - name: "Controlled TCN-vs-GCN comparison"
    description: "A frozen-protocol comparison between a Temporal Convolutional Network and a custom spatio-temporal GCN under matched preprocessing and evaluation rules."
  - name: "Operating-point-aware alerting evaluation"
    description: "A deployment-aware evaluation layer that treats validation-side operating-point calibration and alert policy as first-class components rather than post hoc thresholding."
  - name: "Runtime and limitation analysis"
    description: "An explicit analysis of cross-dataset asymmetry, replay/runtime boundaries, and the current limits of field-validation evidence."

